<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RetailCRM - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary": "#263143",
                    "inverse-surface": "#d4e4fa",
                    "on-secondary-fixed": "#111c2d",
                    "on-tertiary-fixed-variant": "#004c69",
                    "outline-variant": "#3c4a46",
                    "on-tertiary-fixed": "#001e2c",
                    "surface-variant": "#273647",
                    "secondary-container": "#3e495d",
                    "surface-container-lowest": "#010f1f",
                    "on-primary-fixed-variant": "#005047",
                    "on-error-container": "#ffdad6",
                    "surface-tint": "#3cddc7",
                    "on-secondary-fixed-variant": "#3c475a",
                    "secondary-fixed": "#d8e3fb",
                    "error-container": "#93000a",
                    "tertiary-container": "#5ec9ff",
                    "tertiary": "#afe0ff",
                    "on-surface": "#d4e4fa",
                    "surface-container-high": "#1c2b3c",
                    "tertiary-fixed": "#c4e7ff",
                    "outline": "#859490",
                    "on-tertiary": "#00354a",
                    "on-secondary-container": "#aeb9d0",
                    "surface-container-low": "#0d1c2d",
                    "surface-bright": "#2c3a4c",
                    "inverse-on-surface": "#233143",
                    "tertiary-fixed-dim": "#7bd0ff",
                    "inverse-primary": "#006b5f",
                    "surface-dim": "#051424",
                    "on-tertiary-container": "#005371",
                    "primary-fixed-dim": "#3cddc7",
                    "on-background": "#d4e4fa",
                    "background": "#051424",
                    "primary-fixed": "#62fae3",
                    "on-primary": "#003731",
                    "secondary-fixed-dim": "#bcc7de",
                    "error": "#ffb4ab",
                    "surface-container": "#122131",
                    "secondary": "#bcc7de",
                    "surface": "#051424",
                    "primary-container": "#2dd4bf",
                    "on-primary-container": "#00574d",
                    "surface-container-highest": "#273647",
                    "on-primary-fixed": "#00201c",
                    "primary": "#57f1db",
                    "on-surface-variant": "#bacac5",
                    "on-error": "#690005"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "24px",
                    "xl": "32px",
                    "md": "16px",
                    "sm": "8px",
                    "container-margin": "40px",
                    "gutter": "20px",
                    "xs": "4px",
                    "unit": "4px"
            },
            "fontFamily": {
                    "body-sm": ["Inter"],
                    "label-md": ["Geist"],
                    "headline-lg": ["Geist"],
                    "display-lg": ["Geist"],
                    "body-lg": ["Inter"],
                    "headline-md": ["Geist"],
                    "body-md": ["Inter"],
                    "headline-lg-mobile": ["Geist"],
                    "label-sm": ["Geist"]
            },
            "fontSize": {

                    "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],

                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],

                    "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 2px rgba(87, 241, 219, 0.2);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, theme('colors.primary'), theme('colors.primary-container'));
            color: theme('colors.on-primary-container');
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(87, 241, 219, 0.3);
        }

        .role-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        
        .role-card.active {
            background: rgba(87, 241, 219, 0.05);
            border-color: theme('colors.primary');
            box-shadow: inset 0 0 0 1px theme('colors.primary');
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-md md:p-container-margin relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-tertiary-container/5 blur-[150px]"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-md relative z-10">
<div class="glass-panel rounded-2xl p-lg md:p-xl flex flex-col gap-lg w-full">
<!-- Header -->
<div class="text-center flex flex-col items-center gap-sm">
<div class="w-16 h-16 rounded-xl bg-surface-container flex items-center justify-center border border-white/10 mb-2">
<span class="material-symbols-outlined text-[32px] text-primary" style="font-variation-settings: 'FILL' 1;">
                        dashboard
                    </span>
</div>
<h1 class="font-display-lg text-display-lg text-on-background">RetailCRM</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to your enterprise hub</p>
</div>
<!-- Role Selector -->
<div class="grid grid-cols-2 gap-sm mt-sm">
<button class="role-card active rounded-lg p-sm flex flex-col items-center justify-center gap-xs cursor-pointer focus:outline-none" onclick="document.querySelectorAll('.role-card').forEach(c=&gt;c.classList.remove('active')); this.classList.add('active');" type="button">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">
                        admin_panel_settings
                    </span>
<span class="font-label-md text-label-md text-on-surface">Admin</span>
</button>
<button class="role-card rounded-lg p-sm flex flex-col items-center justify-center gap-xs cursor-pointer focus:outline-none" onclick="document.querySelectorAll('.role-card').forEach(c=&gt;c.classList.remove('active')); this.classList.add('active');" type="button">
<span class="material-symbols-outlined text-on-surface-variant text-xl" style="font-variation-settings: 'FILL' 0;">
                        badge
                    </span>
<span class="font-label-md text-label-md text-on-surface-variant">Employee</span>
</button>
</div>
<!-- Form -->
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-on-surface-variant text-[20px] pointer-events-none">
                            mail
                        </span>
<input class="input-glass w-full rounded-lg h-11 pl-[40px] pr-sm font-body-sm text-body-sm text-on-surface placeholder:text-on-surface-variant/50" id="email" placeholder="admin@retailcrm.com" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-on-surface-variant text-[20px] pointer-events-none">
                            lock
                        </span>
<input class="input-glass w-full rounded-lg h-11 pl-[40px] pr-[40px] font-body-sm text-body-sm text-on-surface placeholder:text-on-surface-variant/50" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-sm text-on-surface-variant hover:text-on-surface focus:outline-none flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">
                                visibility_off
                            </span>
</button>
</div>
</div>
<div class="flex items-center gap-sm mt-xs">
<input class="w-4 h-4 rounded border-white/20 bg-surface-container checked:bg-primary checked:border-primary focus:ring-primary focus:ring-offset-background" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Remember me for 30 days</label>
</div>
<button class="btn-primary w-full h-12 rounded-lg font-label-md text-label-md mt-sm flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]">
                        arrow_forward
                    </span>
</button>
</form>
</div>
<!-- Footer Info -->
<div class="text-center mt-lg font-body-sm text-body-sm text-on-surface-variant/60">
<p>Secure Enterprise Portal © 2024</p>
</div>
</main>
</body></html>
